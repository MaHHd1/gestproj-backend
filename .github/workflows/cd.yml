name: CD - Validation du build Docker

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    needs: []

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run Linting Checks (Checkstyle, PMD, SpotBugs)
        run: ./mvnw checkstyle:check pmd:check spotbugs:check

      - name: Construire l'image Docker
        run: docker build -t gestproj-backend:ci-check .

      - name: Confirmer que l'image a ete creee
        run: docker images gestproj-backend:ci-check