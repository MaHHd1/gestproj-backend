name: CI - Tests Backend

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run Linting Checks (Checkstyle, PMD, SpotBugs)
        run: ./mvnw checkstyle:check pmd:check spotbugs:check

      - name: Executer les tests
        run: ./mvnw test

      - name: Publier les resultats de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-tests
          path: target/surefire-reports/