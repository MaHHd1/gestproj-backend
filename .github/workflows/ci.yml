name: CI - Tests Backend

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # `verify` runs the lint plugins bound to validate and the full test suite once.
      # Do not use `spring-boot:run` in CI: it is a long-running server process.
      - name: Verify linting and tests
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

      - name: Publier les resultats de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-tests
          path: target/surefire-reports/

      - name: Publish lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapports-lint
          path: |
            target/checkstyle-result.xml
            target/pmd.xml
