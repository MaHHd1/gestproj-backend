spring.application.name=backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
app.jwt.secret=${JWT_SECRET:please-change-this-secret-key-please-change-this-secret-key}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@gestproj.local}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:false}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.defaults.enabled=true
management.health.mail.enabled=${MAIL_ENABLED:false}

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
